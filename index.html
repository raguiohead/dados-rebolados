<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dados Rebolados 🎲 — Dice Roller para RPG</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header>
    <h1>🎲 Dados Rebolados</h1>
    <p>Dice Roller para RPG de Mesa</p>

    <!-- Seletor de temas -->
    <div class="theme-bar" role="group" aria-label="Selecionar tema">
      <span class="theme-bar-label">Tema:</span>
      <button class="theme-btn active" data-theme="dark"      title="Dark RPG">Dark RPG</button>
      <button class="theme-btn"        data-theme="medieval"  title="Medieval">Medieval</button>
      <button class="theme-btn"        data-theme="modern"    title="Moderno">Moderno</button>
      <button class="theme-btn"        data-theme="cyberpunk" title="Cyber-punk">Cyber-punk</button>
      <button class="theme-btn"        data-theme="bw"        title="Preto e Branco">P&amp;B</button>
    </div>
  </header>

  <main class="app-wrapper">

    <!-- Painel de controles -->
    <section class="controls-panel" aria-label="Painel de controles">
      <h2>🎲 Dados na Mesa</h2>

      <div class="dice-grid" id="diceGrid">
        <!-- Gerado pelo JS -->
      </div>

      <p class="total-count" id="totalCount">
        Total: <span>0</span> dado(s)
      </p>

      <div class="action-btns">
        <button class="btn-action btn-roll" id="btnRoll" disabled>
          🎲 Rolar Dados
        </button>
        <button class="btn-action btn-clear" id="btnClear">
          🗑️ Limpar Mesa
        </button>
      </div>
    </section>

    <!-- Mesa virtual -->
    <section class="table-area" aria-label="Mesa virtual">
      <div class="table-toolbar">
        <span class="table-label">🎯 Mesa</span>
        <div class="zoom-controls" aria-label="Controle de zoom">
          <button class="btn-zoom" id="btnZoomOut" title="Diminuir dados" aria-label="Diminuir zoom">−</button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="btn-zoom" id="btnZoomIn"  title="Aumentar dados" aria-label="Aumentar zoom">+</button>
        </div>
      </div>

      <div class="table-inner">
        <div class="table-placeholder" id="tablePlaceholder">
          <span class="placeholder-icon">🎲</span>
          <span>Adicione dados e role!</span>
        </div>
        <div class="dice-table-container" id="diceTableContainer">
          <!-- Dados visuais gerados pelo JS -->
        </div>
      </div>
    </section>

    <!-- Painel de log / placar -->
    <section class="log-panel" aria-label="Histórico de rolagens">
      <h2>📋 Histórico</h2>
      <div class="log-history" id="logHistory">
        <p class="log-empty">Nenhuma rolagem ainda.</p>
      </div>
    </section>

  </main>

  <!-- Toast de notificação -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/app.js"></script>

</body>
</html>
